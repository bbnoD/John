<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>John Pork is Calling...</title>
    <style>
        body {
            background-color: #000; /* Schwarz für den iPhone-Vibe */
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .phone-container {
            text-align: center;
            animation: vibrate 0.2s infinite; /* Der Anruf-Effekt */
        }

        .profile-img {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 4px solid #333;
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 2.5rem;
            margin: 10px 0 5px;
            font-weight: 400;
        }

        .status {
            color: #8e8e93;
            font-size: 1.2rem;
            margin-bottom: 50px;
            letter-spacing: 1px;
        }

        .actions {
            display: flex;
            gap: 60px;
            justify-content: center;
        }

        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: white;
            font-size: 0.8rem;
        }

        .icon-circle {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            margin-bottom: 10px;
            transition: transform 0.2s;
        }

        .decline { background-color: #ff3b30; }
        .accept { background-color: #4cd964; }

        .action-btn:hover .icon-circle {
            transform: scale(1.1);
        }

        /* Animation für das Vibrieren des Handys */
        @keyframes vibrate {
            0% { transform: translate(0); }
            25% { transform: translate(2px, -2px); }
            50% { transform: translate(-2px, 2px); }
            75% { transform: translate(2px, 2px); }
            100% { transform: translate(0); }
        }

        .overlay {
            position: fixed;
            bottom: 20px;
            font-size: 0.7rem;
            color: #444;
        }
    </style>
</head>
<body>

    <div class="phone-container">
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=JohnPork" alt="John Pork" class="profile-img">
        
        <h1>John Pork</h1>
        <p class="status">Incoming Call...</p>

        <div class="actions">
            <a href="#" class="action-btn" onclick="alert('Abgelehnt... er wird dich trotzdem finden.')">
                <div class="icon-circle decline">✕</div>
                Decline
            </a>
            <a href="#" class="action-btn" onclick="alert('HEYYY! John Pork freut sich!')">
                <div class="icon-circle accept">📞</div>
                Accept
            </a>
        </div>
    </div>

    <div class="overlay">The Pork is watching.</div>

</body>
</html>
