<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>John Pork is Calling...</title>
    <style>
        body {
            background-color: #000;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .phone-container {
            text-align: center;
            animation: vibrate 0.2s infinite;
        }

        .profile-img {
            width: 220px;
            height: 220px;
            border-radius: 50%; 
            border: 3px solid #333;
            object-fit: cover; 
            margin-bottom: 20px;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.2);
        }

        h1 {
            font-size: 2.8rem;
            margin: 10px 0 5px;
            font-weight: 300;
        }

        .status {
            color: #8e8e93;
            font-size: 1.3rem;
            margin-bottom: 60px;
        }

        .actions {
            display: flex;
            gap: 50px;
            justify-content: center;
        }

        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: white;
            font-size: 0.9rem;
        }

        .icon-circle {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            margin-bottom: 12px;
        }

        .decline { background-color: #ff3b30; }
        .accept { background-color: #4cd964; }

        @keyframes vibrate {
            0% { transform: translate(0); }
            25% { transform: translate(1px, -1px); }
            50% { transform: translate(-1px, 1px); }
            75% { transform: translate(1px, 1px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>

    <div class="phone-container">
        <img src="Screenshot 2026-04-25 024741.png" alt="John Pork" class="profile-img">
        
        <h1>John Pork</h1>
        <p class="status">Bietet Eier lecken an</p>

        <div class="actions">
            <div class="action-btn">
                <div class="icon-circle decline">✕</div>
                Ablehnen
            </div>
            <div class="action-btn">
                <div class="icon-circle accept">📞</div>
                Annehmen
            </div>
        </div>
    </div>

</body>
</html>
