<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>John Pork is Calling...</title>
    <style>
        body {
            background-color: #000;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Anruf-Screen */
        #calling-screen {
            text-align: center;
            animation: vibrate 0.2s infinite;
        }

        .profile-img {
            width: 220px;
            height: 220px;
            border-radius: 50%; 
            border: 3px solid #333;
            object-fit: cover; 
            margin-bottom: 20px;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.2);
        }

        h1 { font-size: 2.8rem; margin: 10px 0 5px; font-weight: 300; }
        .status { color: #8e8e93; font-size: 1.3rem; margin-bottom: 60px; }

        .actions { display: flex; gap: 50px; justify-content: center; }
        .action-btn { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            cursor: pointer; 
            font-size: 0.9rem;
        }

        .icon-circle {
            width: 75px; height: 75px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 2rem; margin-bottom: 12px;
        }
        .decline { background-color: #ff3b30; }
        .accept { background-color: #4cd964; }

        /* Video-Chat Screen (Standardmäßig versteckt) */
        #video-chat-container {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
        }

        /* Das Video von John Pork (Hintergrund) */
        #john-video {
            width: 100%; height: 100%; object-fit: cover;
        }

        /* Deine eigene Kamera (Kleines Fenster oben rechts) */
        #user-camera {
            position: absolute;
            top: 20px; right: 20px;
            width: 120px; height: 180px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.3);
            transform: scaleX(-1); /* Spiegelverkehrt wie echte Frontkamera */
        }

        @keyframes vibrate {
            0% { transform: translate(0); }
            25% { transform: translate(1px, -1px); }
            50% { transform: translate(-1px, 1px); }
            75% { transform: translate(1px, 1px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>

    <div id="calling-screen">
        <img src="Johnny.png" alt="John Pork" class="profile-img">
        <h1>John Pork</h1>
        <p class="status">bietet dir Eier lecken an</p>

        <div class="actions">
            <div class="action-btn" onclick="location.reload()">
                <div class="icon-circle decline">✕</div>
                Ablehnen
            </div>
            <div class="action-btn" onclick="startVideoChat()">
                <div class="icon-circle accept">📞</div>
                Annehmen
            </div>
        </div>
    </div>

    <div id="video-chat-container">
        <video id="john-video" playsinline>
            <source src="John.mp4" type="video/mp4">
            Dein Browser unterstützt keine Videos.
        </video>
        <video id="user-camera" autoplay playsinline muted></video>
    </div>

    <script>
        async function startVideoChat() {
            const callingScreen = document.getElementById('calling-screen');
            const chatContainer = document.getElementById('video-chat-container');
            const johnVideo = document.getElementById('john-video');
            const userCamera = document.getElementById('user-camera');

            // 1. Screens wechseln
            callingScreen.style.display = 'none';
            chatContainer.style.display = 'block';

            // 2. John Pork Video starten
            johnVideo.play();

            // 3. User Kamera aktivieren
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                userCamera.srcObject = stream;
            } catch (err) {
                console.error("Kamera-Zugriff verweigert:", err);
                alert("Kamera konnte nicht geladen werden.");
            }
        }
    </script>

</body>
</html>
